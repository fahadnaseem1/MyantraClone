<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        .btn{
            height: 40px;
            width: 150px;
            margin: 10px 25px;
            font-weight: 700;
            padding: 0px 10px;
            text-transform: uppercase;
            background-color: #65e35a;
            border: none;
            border-radius: 20px;
        }
        .wish{
            font-weight: 300;
            padding: 5px 30px;
            text-transform: uppercase;
            background-color: rgb(241, 239, 239);
            border: 3px solid black;
            border-radius: 15px;
        }
        </style>
</head>
<body>
    <button class="btn" onclick="
        cartQuantity++;
        document.querySelector('#cartSummary').innerHTML=`your bag has ${cartQuantity} item`;">add to bag</button>
    <button class="wish" onclick="
        cartQuantity--;
        document.querySelector('#cartSummary').innerHTML=`your bag has ${cartQuantity} item`;"> move to wishlist</button>
    <button class="btn" onclick="
        cartQuantity+=2;
        document.querySelector('#cartSummary').innerHTML=`your bag has ${cartQuantity} item`;">add 1+1 sale item</button>
    <h1 id="cartSummary">your bag has 2 item</h1>
    <script>
        let cartQuantity=0;
        document.querySelector('#cartSummary').innerHTML=`your bag has ${cartQuantity} item`;
    </script>
</body>
</html>
